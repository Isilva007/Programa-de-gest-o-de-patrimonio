<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP - Gestão Patrimonial</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar shadow-sm">
            <div class="p-3 text-center border-bottom">
                <div class="logo-box mb-2">SGP</div>
                <small class="text-muted">Gestão Patrimonial</small>
            </div>
            <ul class="nav flex-column mt-3">
                <li class="nav-item p-3 active"><i data-lucide="layout-dashboard"></i> Dashboard</li>
                <li class="nav-item p-3"><i data-lucide="package"></i> Meus Bens</li>
                <li class="nav-item p-3"><i data-lucide="file-text"></i> Meus Pedidos</li>
                <li class="nav-item p-3"><i data-lucide="user"></i> Perfil</li>
            </ul>
        </nav>

        <main class="content-area p-4">
            <header class="mb-4">
                <h2 class="fw-bold">Dashboard</h2>
                <p class="text-muted">Bem-vindo ao Sistema de Gestão Patrimonial</p>
            </header>

            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="card p-3 border-0 shadow-sm">
                        <small class="text-muted">Meus Bens</small>
                        <h3 class="fw-bold">0</h3>
                        <small class="text-info">Bens sob responsabilidade</small>
                    </div>
                </div>
                </div>

            <div class="row">
                <div class="col-md-6">
                    <h5 class="mb-3">Ações Rápidas</h5>
                    <div class="action-card mb-2 d-flex align-items-center p-3 border rounded">
                        <div class="icon-circle bg-primary-light text-primary me-3"><i data-lucide="plus"></i></div>
                        <div>
                            <strong>Registar Novo Bem</strong><br>
                            <small class="text-muted">Adicionar bem patrimonial</small>
                        </div>
                    </div>
                    </div>
            </div>
        </main>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
